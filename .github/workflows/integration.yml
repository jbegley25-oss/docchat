name: Integration Tests

on: [push, workflow_dispatch]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install .

      - name: Configure git
        run: |
          git config user.email "test@example.com"
          git config user.name "Test"

      - name: Test single-message CLI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          chat 'say hello'

      - name: Test debug flag shows tool calls
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          output=$(chat --debug 'please use the ls tool to list files in the current directory')
          echo "$output"
          echo "$output" | grep -q '\[tool\]'

      - name: Test file reading via CLI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          chat 'what files are in the current directory?'
